name: Auto
description: Land pull requests automatically when a label is set and checks succeed
inputs:
  base:
    default: main
    description: The base branch to rebase onto
    required: false
  email:
    default: github-actions[bot]@users.noreply.github.com
    description: Email
    required: false
  fullname:
    default: github-actions[bot]
    description: Full name
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  gpg-passphrase:
    default: ""
    description: GPG private key passphrase
    required: false
  gpg-private-key:
    default: ""
    description: GPG private key for signing commits
    required: false
  label:
    default: auto
    description: Label required to enable auto-landing
    required: false
  pull-request-url:
    description: The Pull Request URL
    required: true
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  sign-commits:
    default: "false"
    description: Set to true to sign commits with GPG
    required: false
  username:
    default: github-actions
    description: Username
    required: false
runs:
  using: composite
  steps:
    - id: gate
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        LABEL: ${{ inputs.label }}
        PR_URL: ${{ inputs.pull-request-url }}
      run: |
        CONTINUE=$(
          gh pr view "$PR_URL" --json state,isDraft,merged,labels --jq \
            '(.state=="OPEN") and (.isDraft==false) and (.merged==false) and (any(.labels[].name; .=="'"$LABEL"'"))'
        )
        echo "continue=$CONTINUE" >> "$GITHUB_OUTPUT"
      shell: bash
    - if: steps.gate.outputs.continue == 'true'
      uses: shikanime-studio/actions/land@v8
      with:
        base: ${{ inputs.base }}
        email: ${{ inputs.email }}
        fullname: ${{ inputs.fullname }}
        github-token: ${{ inputs.github-token }}
        gpg-passphrase: ${{ inputs.gpg-passphrase }}
        gpg-private-key: ${{ inputs.gpg-private-key }}
        pull-request-url: ${{ inputs.pull-request-url }}
        registry: ${{ inputs.registry }}
        sign-commits: ${{ inputs.sign-commits }}
        username: ${{ inputs.username }}
