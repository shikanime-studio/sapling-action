name: JavaScript Integration
description: Run a list of package manager stages via corepack
inputs:
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  package-manager:
    default: pnpm
    description: Package manager to run via corepack (pnpm, yarn, npm)
    required: false
  stages:
    default: '["check","lint","build"]'
    description: JSON array of stages to run in order
    required: false
  workspace:
    description: If non-empty, runs pnpm with --filter <workspace>
    required: false
runs:
  using: composite
  steps:
    - env:
        REGISTRY: ${{ inputs.registry }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        STAGES: ${{ inputs.stages }}
        WORKSPACE: ${{ inputs.workspace }}
      run: |
        stages="$(echo "$STAGES" | nix run "$REGISTRY#jq" -- -r '.[]')"

        args=()
        if [ -n "${WORKSPACE:-}" ]; then
          args+=(--filter "$WORKSPACE")
        fi

        while IFS= read -r stage; do
          [ -z "$stage" ] && continue

          corepack "$PACKAGE_MANAGER" "${args[@]}" run "$stage"
        done <<< "$stages"
      shell: bash
