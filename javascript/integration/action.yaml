name: JavaScript Integration
description: Run a list of package manager stages via corepack
inputs:
  recursive:
    default: "false"
    description: If true, runs in workspace mode with --recursive
    required: false
  stages:
    default: '["check","lint","build"]'
    description: JSON array of stages to run in order
    required: false
runs:
  using: composite
  steps:
    - env:
        RECURSIVE: ${{ inputs.recursive }}
        STAGES: ${{ inputs.stages }}
      run: |
        stages="$(echo "$STAGES" | jq -r '.[]')"

        args=()
        if [ "$RECURSIVE" = "true" ]; then
          args+=(--recursive)
        fi

        while IFS= read -r stage; do
          corepack pnpm "${args[@]}" run "$stage" --if-present
        done <<< "$stages"
      shell: bash
