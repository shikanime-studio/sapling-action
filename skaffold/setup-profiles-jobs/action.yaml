name: Setup Skaffold Profiles Jobs
description: Generate matrices for Skaffold profiles (render/build)
inputs:
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  path:
    default: .
    description: Path to the directory containing skaffold.yaml
    required: false
outputs:
  continue:
    description: Whether any profiles were found
    value: ${{ steps.matrix.outputs.continue }}
  matrix:
    description: JSON array usable as a strategy matrix include list
    value: ${{ steps.matrix.outputs.matrix }}
runs:
  using: composite
  steps:
    - id: matrix
      env:
        ROOT_PATH: ${{ inputs.path }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        FILE="$ROOT_PATH/skaffold.yaml"
        MATRIX="$(yq -o=json -I=0 '.profiles // [] | map({"name": .name})' "$FILE")"
        echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
        continue=$([ "$MATRIX" = "[]" ] && echo "false" || echo "true")
        echo "continue=$continue" >> "$GITHUB_OUTPUT"
      shell: bash
