name: Land
description: Land a pull request
inputs:
  base:
    default: main
    description: The base branch to rebase onto
    required: false
  email:
    default: github-actions[bot]@users.noreply.github.com
    description: Email
    required: false
  fullname:
    default: github-actions[bot]
    description: Full name
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  gpg-passphrase:
    default: ""
    description: GPG private key passphrase
    required: false
  gpg-private-key:
    default: ""
    description: GPG private key for signing commits
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  sign-commits:
    default: "false"
    description: Set to true to sign commits with GPG
    required: false
  username:
    default: github-actions
    description: Username
    required: false
runs:
  using: composite
  steps:
    - id: stack
      uses: shikanime-studio/actions/stack@v8
      with:
        github-token: ${{ inputs.github-token }}
        pull-request-url: ${{ inputs.pull-request-url }}
    - if: runner.debug == '1'
      run: |
        echo "DEBUG_FLAG=--debug" >> "$GITHUB_ENV"
      shell: bash
    - env:
        EMAIL: ${{ inputs.email }}
        FULLNAME: ${{ inputs.fullname }}
        REGISTRY: ${{ inputs.registry }}
      if: |
        steps.stack.outputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- config \
          --local ui.username "$FULLNAME <$EMAIL>" $DEBUG_FLAG
      shell: bash
    - id: importGPG
      if: |
        inputs.sign-commits == 'true'
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        git_commit_gpgsign: true
        git_user_signingkey: true
        gpg_private_key: ${{ inputs.gpg-private-key }}
        passphrase: ${{ inputs.gpg-passphrase }}
    - env:
        GPG_KEY_ID: ${{ steps.importGPG.outputs.keyid }}
        REGISTRY: ${{ inputs.registry }}
      if: |
        inputs.sign-commits == 'true' &&
        steps.stack.outputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- config \
          --local gpg.key "$GPG_KEY_ID" \
          --local commit.gpgsign true $DEBUG_FLAG
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        USERNAME: ${{ inputs.username }}
      if: |
        steps.stack.outputs.method == 'ghstack'
      run: |
        GHSTACKRC_PATH=$(mktemp)
        cat > "$GHSTACKRC_PATH" <<EOF
        [ghstack]
        github_url = github.com
        github_oauth = $GH_TOKEN
        github_username = $USERNAME
        EOF
        echo "GHSTACKRC_PATH=$GHSTACKRC_PATH" >> "$GITHUB_ENV"
      shell: bash
    - env:
        PR_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: |
        steps.stack.outputs.method == 'ghstack'
      run: |
        nix run "$REGISTRY#ghstack" -- $DEBUG_FLAG checkout "$PR_URL"
        nix run "$REGISTRY#ghstack" -- $DEBUG_FLAG land "$PR_URL"
      shell: bash
    - env:
        BASE: ${{ inputs.base }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: |
        steps.stack.outputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- pr pull \
          --goto \
          "$PR_URL" $DEBUG_FLAG

        nix run "$REGISTRY#sapling" -- rebase \
          --dest "$BASE" $DEBUG_FLAG

        nix run "$REGISTRY#sapling" -- push \
          --to "$BASE" $DEBUG_FLAG

        DELETE_BRANCH=$(gh pr view "$PR_URL" --json headRefName -q .headRefName)
        nix run "$REGISTRY#sapling" -- push \
          --delete $DELETE_BRANCH $DEBUG_FLAG
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ inputs.pull-request-url }}
      if: |
        steps.stack.outputs.method == 'github-pull-request'
      run: |
        gh pr merge \
          --rebase \
          --delete-branch \
          "$PR_URL"
      shell: bash
