name: Setup Packages Jobs
description: Generate matrix for Nix packages on Linux systems
inputs:
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  systems:
    default: |
      {
        "ubuntu-latest": ["x86_64-linux"],
        "ubuntu-24.04-arm": ["aarch64-linux", "armv6l-linux", "armv7l-linux"]
      }
    description: Runner to systems mapping
    required: false
  excludes:
    default: '["devenv-up", "devenv-test"]'
    description: Packages to exclude
    required: false
outputs:
  continue:
    description: Whether any Linux packages exist
    value: ${{ steps.matrix.outputs.continue }}
  matrix:
    description: JSON array of matrix entries
    value: ${{ steps.matrix.outputs.matrix }}
runs:
  using: composite
  steps:
    - id: matrix
      uses: actions/github-script@v8
      with:
        script: |
          const systemsRaw = core.getInput('systems') || '{}';
          const excludesRaw = core.getInput('excludes') || '[]';
          let systems;
          let excludes;
          try {
            systems = JSON.parse(systemsRaw);
          } catch (e) {
            core.setFailed(`invalid JSON for input "systems": ${e?.message || String(e)}`);
            return;
          }
          try {
            excludes = new Set(JSON.parse(excludesRaw));
          } catch (e) {
            core.setFailed(`invalid JSON for input "excludes": ${e?.message || String(e)}`);
            return;
          }
          const { exitCode, stdout: jsonText, stderr } = await exec.getExecOutput(
            'nix',
            ['flake', 'show', '--json', '--all-systems', '--accept-flake-config', '--no-pure-eval'],
            { silent: true, ignoreReturnCode: true },
          );
          if (exitCode !== 0) {
            core.setFailed(`nix flake show failed (exit ${exitCode})${stderr ? `\n\n${stderr.trim()}` : ''}`);
            return;
          }
          let flake;
          try {
            flake = JSON.parse(jsonText);
          } catch (e) {
            core.setFailed(`failed to parse nix flake show JSON: ${e?.message || String(e)}`);
            return;
          }
          const packagesBySystem = flake.packages || {};
          const sys2runner = {};
          for (const [runner, list] of Object.entries(systems)) {
            for (const system of list) {
              sys2runner[system] = runner;
            }
          }
          const matrix = [];
          for (const [system, pkgs] of Object.entries(packagesBySystem)) {
            if (!(system in sys2runner)) continue;
            for (const name of Object.keys(pkgs || {})) {
              if (excludes.has(name)) continue;
              matrix.push({ system, runner: sys2runner[system] || 'ubuntu-latest', name });
            }
          }
          core.setOutput('matrix', JSON.stringify(matrix));
          core.setOutput('continue', matrix.length > 0 ? 'true' : 'false');
