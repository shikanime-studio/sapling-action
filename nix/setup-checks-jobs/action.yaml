name: Setup Checks Jobs
description: Generate matrix for Nix checks on Linux systems
inputs:
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  systems:
    default: |
      {
        "ubuntu-latest": ["x86_64-linux"],
        "ubuntu-24.04-arm": ["aarch64-linux", "armv6l-linux", "armv7l-linux"]
      }
    description: Runner to systems mapping
    required: false
runs:
  using: composite
  steps:
    - id: matrix
      uses: actions/github-script@v8
      with:
        script: |
          const systemsRaw = core.getInput('systems') || '{}';
          let systems;
          try {
            systems = JSON.parse(systemsRaw);
          } catch (e) {
            core.setFailed(`invalid JSON for input "systems": ${e?.message || String(e)}`);
            return;
          }
          const { exitCode, stdout: jsonText, stderr } = await exec.getExecOutput(
            'nix',
            ['flake', 'show', '--json', '--all-systems', '--accept-flake-config', '--no-pure-eval'],
            { silent: true, ignoreReturnCode: true },
          );
          if (exitCode !== 0) {
            core.setFailed(`nix flake show failed (exit ${exitCode})${stderr ? `\n\n${stderr.trim()}` : ''}`);
            return;
          }
          let flake;
          try {
            flake = JSON.parse(jsonText);
          } catch (e) {
            core.setFailed(`failed to parse nix flake show JSON: ${e?.message || String(e)}`);
            return;
          }
          const availableSystems = Object.keys(flake.checks || {});
          const matrix = [];
          for (const [runner, list] of Object.entries(systems)) {
            for (const system of list) {
              if (availableSystems.includes(system)) {
                matrix.push({ system, runner });
              }
            }
          }
          core.setOutput('matrix', JSON.stringify(matrix));
          core.setOutput('continue', matrix.length > 0 ? 'true' : 'false');
outputs:
  continue:
    description: Whether any Linux checks/packages exist
    value: ${{ steps.matrix.outputs.continue }}
  matrix:
    description: JSON array of matrix entries
    value: ${{ steps.matrix.outputs.matrix }}
