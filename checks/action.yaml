name: Checks
description: Verify a pull request is landable (open, not draft, not merged) and all checks have passed
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  label:
    default: auto
    description: Label required to continue
    required: false
  pull-request-url:
    description: The Pull Request URL
    required: true
outputs:
  continue:
    description: Whether the pull request is eligible (and all checks succeeded)
    value: ${{ steps.checks.outputs.continue }}
runs:
  using: composite
  steps:
    - id: checks
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const requiredLabel = (core.getInput('label') || 'auto').trim();
          const prUrl = core.getInput('pull-request-url', { required: true });
          const match = prUrl.match(/\/pull\/(\d+)(?:[/?#]|$)/);
          const prNumber = match ? Number(match[1]) : 0;
          if (!prNumber) {
            core.setOutput('continue', 'false');
            return;
          }
          const headSha = context.payload?.check_suite?.head_sha;
          const { owner, repo } = context.repo;
          try {
            const query = `
              query($owner: String!, $name: String!, $number: Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    state
                    isDraft
                    merged
                    headRefOid
                    labels(first: 100) {
                      nodes { name }
                    }
                    commits(last: 1) {
                      nodes {
                        commit {
                          statusCheckRollup { state }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const resp = await github.graphql(query, { owner, name: repo, number: prNumber });
            const pr = resp.repository.pullRequest;
            const prHead = pr.headRefOid;
            const labels = (pr.labels?.nodes || []).map((l) => l.name);
            const labelOk = labels.includes(requiredLabel);
            const nodes = pr.commits.nodes;
            const rollupState = nodes?.[0]?.commit?.statusCheckRollup?.state || '';
            const shaOk = headSha ? prHead === headSha : true;
            const prOk = pr.state === 'OPEN' && pr.isDraft === false && pr.merged === false;
            const checksOk = rollupState === 'SUCCESS';
            const ok = prOk && labelOk && checksOk && shaOk;
            core.setOutput('continue', ok ? 'true' : 'false');
          } catch (e) {
            core.setOutput('continue', 'false');
            core.setFailed(`failed to evaluate PR checks: ${e?.message || String(e)}`);
          }
